version: "2"

run:
  allow-parallel-runners: true
  relative-path-mode: gomod
  tests: true
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose     # Detect leaked HTTP response bodies.
    - copyloopvar   # Catch unsafe loop variable copies and captures.
    - durationcheck # Flag invalid duration arithmetic.
    - errorlint     # Enforce modern wrapped-error handling.
    - gocognit      # Flag functions whose control flow becomes too hard to follow.
    - gosec         # Flag common security-sensitive code patterns and dangerous APIs.
    - loggercheck   # Validate structured logging key/value usage.
    - misspell      # Catch common spelling mistakes using UK English.
    - modernize     # Prefer current Go language and standard-library idioms where they improve clarity.
    - noctx         # Require context-aware APIs in non-test code paths.
    - noinlineerr   # Keep error handling out of inline declarations for clearer control flow.
    - nilerr        # Reject error branches that accidentally return nil.
    - nilnil        # Reject returning both a nil error and an invalid nil value combination.
    - nilnesserr    # Catch mismatched nil return values in error-handling branches.
    - noshadow      # Reject declarations that shadow names from an outer scope.
    - nolintlint    # Keep nolint directives specific and justified.
    - revive        # Provide configurable, actively maintained style and correctness checks.
    - testifylint   # Catch misuse of testify assertions in tests.
    - unconvert     # Remove unnecessary type conversions.
    - unparam       # Find parameters that are never used by callees.
  settings:
    custom:
      noshadow:
        type: module
        description: Reports declarations that shadow names from an outer scope.
        settings:
          testT: true
    errcheck:
      # Surface intentionally ignored writes and unsafe type assertions.
      check-blank: true
      check-type-assertions: true
    gocognit:
      # Keep complexity pressure visible before handlers and wiring paths become opaque.
      min-complexity: 15
    govet:
      # Keep the higher-signal analysers that catch real nil-flow and shadowing bugs.
      enable:
        - nilness
        - shadow
    misspell:
      # Match the repo's preferred spelling convention.
      locale: UK
    nolintlint:
      # Force every nolint to stay intentional, documented, and narrowly scoped.
      allow-unused: false
      require-explanation: true
      require-specific: true
    revive:
      # Keep a small revive ruleset that improves readability without fighting the repo.
      rules:
        - name: comment-spacings
        - name: indent-error-flow
        - name: unexported-return
          # Factory helpers and package-local seams return unexported types on purpose.
          disabled: true
    testifylint:
      # Enable the full testify ruleset because the repo uses testify heavily in tests.
      enable-all: true
  exclusions:
    # Generated Go should still be linted loosely enough to avoid constant churn.
    generated: lax
    paths:
      # Generated mocks are regenerated from package-local interfaces.
      - ^internal/mock/
    rules:
      # Test files legitimately repeat fixtures and request payloads that would be noisy elsewhere.
      - path: (.+)_test\.go
        linters:
          - dupl
          - goconst
          - lll
          - noctx
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      # Normalise legacy empty-interface spellings to modern Go.
      rewrite-rules:
        - pattern: interface{}
          replacement: any
    goimports:
      # Keep first-party imports grouped consistently for this module path.
      local-prefixes:
        - github.com/siutsin/telegram-jung2-bot
  exclusions:
    # Generated files are left out of formatter enforcement for the same reason as lint.
    generated: lax
    paths:
      # Generated mocks are regenerated from package-local interfaces.
      - ^internal/mock/
